# Cyber Legion baseline Dependabot config — copy to .github/dependabot.yml at the
# root of any repo to opt in. Groups minor+patch to reduce noise; security
# updates always open immediately per org-level setting.
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gha-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
        exclude-patterns:
          - "react"
          - "react-dom"
          - "next"
          - "typescript"
      majors:
        update-types: [major]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
